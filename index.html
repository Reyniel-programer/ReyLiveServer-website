<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuthHub</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: #fff;
      min-height: 100vh;
    }

    .hidden {
      display: none !important;
    }

    .tab-active {
      border-bottom: 3px solid #f59e0b !important;
      color: #f59e0b !important;
      font-weight: bold;
    }

    input,
    select,
    textarea {
      background: #27272a;
      border: 1px solid #3f3f46;
      border-radius: 12px;
      color: #fff;
      padding: 10px 14px;
      width: 100%;
      outline: none;
      font-size: 14px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #f59e0b;
    }

    label {
      display: block;
      font-size: 13px;
      color: #a1a1aa;
      margin-bottom: 6px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      padding: 11px 18px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      transition: opacity 0.15s;
      justify-content: center;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-orange {
      background: #f59e0b;
      color: #000;
    }

    .btn-gray {
      background: #3f3f46;
      color: #fff;
    }

    .btn-red {
      background: #ef4444;
      color: #fff;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid #3f3f46;
      color: #fff;
      border-radius: 12px;
      padding: 11px 18px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    .btn-ghost:hover {
      background: #27272a;
    }

    .status-bar {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 10px;
      margin-top: 12px;
      font-size: 13px;
      max-width: 90%;
      word-break: break-word;
    }

    .rel-pw {
      position: relative;
    }

    .pw-eye {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #71717a;
      font-size: 14px;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .video-card {
      background: #27272a;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #3f3f46;
      display: flex;
      flex-direction: column;
    }

    .video-player video {
      width: 100%;
      height: 180px;
      background: #000;
      object-fit: cover;
    }

    .video-info {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-grow: 1;
    }

    .section-box {
      background: #18181b;
      border-radius: 18px;
      padding: 20px;
      border: 1px solid #27272a;
    }

    .upload-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }

    .upload-group .btn {
      flex: 1 1 160px;
    }

    .profile-cover {
      height: 240px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #1d4ed8, #38bdf8);
      background-size: cover;
      background-position: center;
    }

    .profile-cover .cover-actions {
      position: absolute;
      bottom: 16px;
      right: 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .profile-header {
      background: #18181b;
      padding: 24px;
      border-bottom: 1px solid #27272a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .profile-body {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 20px;
    }

    .profile-photo {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #f59e0b;
      background: #27272a;
    }

    .loading {
      opacity: 0.7;
      pointer-events: none;
    }

    @media (max-width: 700px) {
      .video-grid {
        grid-template-columns: 1fr;
      }

      .profile-body {
        grid-template-columns: 1fr !important;
      }

      .signup-grid {
        grid-template-columns: 1fr !important;
      }

      .span-2 {
        grid-column: auto !important;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="auth-wrap" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#0f172a,#18181b)">
      <div style="width:100%;max-width:480px;background:#18181b;border-radius:24px;border:1px solid #f59e0b33;overflow:hidden;">
        <div style="padding:32px 32px 24px;text-align:center;border-bottom:1px solid #27272a;">
          <h1 style="font-size:24px;color:#f59e0b;font-weight:700;">AuthHub</h1>
          <p style="color:#71717a;font-size:13px;margin-top:6px;">Login or create your personal profile</p>
        </div>

        <div style="display:flex;border-bottom:1px solid #27272a;">
          <button type="button" id="tab-login" class="tab-active" style="flex:1;padding:14px;background:none;border:none;color:inherit;font-size:13px;cursor:pointer;">Login</button>
          <button type="button" id="tab-signup" style="flex:1;padding:14px;background:none;border:none;color:#71717a;font-size:13px;cursor:pointer;">Sign Up</button>
        </div>

        <div style="padding:28px;">
          <div id="login-form">
            <div style="display:flex;flex-direction:column;gap:14px;">
              <div>
                <label for="l-email">Email</label>
                <input id="l-email" type="email" placeholder="Enter email" autocomplete="email" />
              </div>

              <div>
                <label for="l-pass">Password</label>
                <div class="rel-pw">
                  <input id="l-pass" type="password" placeholder="Enter password" autocomplete="current-password" />
                  <button type="button" class="pw-eye" id="l-eye">👁</button>
                </div>
              </div>

              <button type="button" class="btn btn-orange" id="login-btn" style="width:100%;justify-content:center;">Sign In</button>
            </div>

            <p style="text-align:center;margin-top:16px;font-size:13px;color:#71717a;">
              Don't have an account?
              <span id="go-signup" style="color:#f59e0b;cursor:pointer;font-weight:600;">Sign up</span>
            </p>
          </div>

          <div id="signup-form" class="hidden">
            <div class="signup-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
              <div><label for="s-user">Username</label><input id="s-user" placeholder="Choose username" /></div>
              <div><label for="s-name">Full Name</label><input id="s-name" placeholder="Your name" /></div>
              <div><label for="s-email">Email</label><input id="s-email" type="email" placeholder="you@email.com" autocomplete="email" /></div>
              <div><label for="s-phone">Phone</label><input id="s-phone" type="tel" placeholder="+63 9XX XXX XXX" /></div>

              <div>
                <label for="s-pass">Password</label>
                <div class="rel-pw">
                  <input id="s-pass" type="password" placeholder="Min 6 chars" autocomplete="new-password" />
                  <button type="button" class="pw-eye" id="s-eye">👁</button>
                </div>
              </div>

              <div><label for="s-age">Age</label><input id="s-age" type="number" placeholder="Age" /></div>

              <div>
                <label for="s-gender">Gender</label>
                <select id="s-gender">
                  <option value="">Select</option>
                  <option>Male</option>
                  <option>Female</option>
                  <option>Prefer not to say</option>
                </select>
              </div>

              <div><label for="s-bday">Birthday</label><input id="s-bday" type="date" /></div>
              <div class="span-2" style="grid-column:span 2"><label for="s-addr">Address</label><input id="s-addr" placeholder="Your address" /></div>
              <div class="span-2" style="grid-column:span 2"><label for="s-bio">Bio</label><textarea id="s-bio" rows="2" placeholder="Tell something about yourself"></textarea></div>

              <div class="span-2" style="grid-column:span 2">
                <button type="button" class="btn btn-orange" id="signup-btn" style="width:100%;justify-content:center;">Create Account</button>
              </div>
            </div>

            <p style="text-align:center;margin-top:14px;font-size:13px;color:#71717a;">
              Already have an account?
              <span id="go-login" style="color:#f59e0b;cursor:pointer;font-weight:600;">Sign in</span>
            </p>
          </div>

          <div id="auth-status"></div>
        </div>
      </div>
    </div>

    <div id="profile-wrap" class="hidden" style="background:#09090b;min-height:100vh;">
      <div id="cover-bg" class="profile-cover">
        <div class="cover-actions">
          <button type="button" class="btn btn-orange" id="cover-btn">Change Cover</button>
          <input type="file" id="cover-upload-input" accept="image/*" class="hidden" />
        </div>
      </div>

      <div class="profile-header">
        <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
          <img id="p-photo" class="profile-photo" src="" alt="Profile photo" />
          <div>
            <h2 id="p-name" style="font-size:22px;font-weight:700;"></h2>
            <p id="p-username-tag" style="color:#71717a;font-size:14px;"></p>
          </div>
        </div>

        <button type="button" class="btn btn-ghost" id="logout-btn">Log Out</button>
      </div>

      <div class="profile-body">
        <div class="section-box">
          <h3 style="font-size:16px;font-weight:700;margin-bottom:12px;">Profile</h3>
          <p id="p-bio" style="color:#a1a1aa;font-size:13px;font-style:italic;margin-bottom:14px;">No bio added</p>

          <div class="upload-group">
            <button type="button" class="btn btn-orange" id="photo-btn">Change Photo</button>
            <input type="file" id="photo-upload-input" accept="image/*" class="hidden" />

            <button type="button" class="btn btn-gray" id="video-btn">+ Add Video</button>
            <input type="file" id="video-upload-input" accept="video/*" class="hidden" />
          </div>
        </div>

        <div class="section-box">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px;flex-wrap:wrap;">
            <h3 style="font-size:16px;font-weight:700;">My Videos</h3>
          </div>

          <div id="video-grid" class="video-grid"></div>
          <div id="no-videos" style="text-align:center;padding:40px 20px;color:#71717a;display:none;">
            No videos yet. Upload your first video!
          </div>
        </div>
      </div>

      <div id="prof-status" style="text-align:center;padding:0 0 20px;"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc
    } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";
    import {
      getStorage,
      ref,
      uploadBytes,
      getDownloadURL
    } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlFrL4HKjIppmELABVISTUMdI9GpQ79kA",
      authDomain: "reyliveserver-73cba.firebaseapp.com",
      projectId: "reyliveserver-73cba",
      storageBucket: "reyliveserver-73cba.firebasestorage.app",
      messagingSenderId: "220200732080",
      appId: "1:220200732080:web:463bceaa7189f7ad3b4275"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let cu = null;
    const $ = (id) => document.getElementById(id);

    const state = {
      logging: false,
      loadingProfile: false
    };

    function setStatus(elId, msg, ok) {
      const el = $(elId);
      if (!el) return;
      el.innerHTML = "";
      const div = document.createElement("div");
      div.className = "status-bar";
      div.style.background = ok ? "#14532d" : "#7f1d1d";
      div.textContent = msg;
      el.appendChild(div);
    }

    function showAuthStatus(msg, ok) {
      setStatus("auth-status", msg, ok);
    }

    function showProfStatus(msg, ok) {
      setStatus("prof-status", msg, ok);
    }

    function defaultUser(uid, email, displayName) {
      return {
        uid,
        email,
        name: displayName || "User",
        username: email?.split("@")[0] || "user",
        phone: "",
        age: "",
        gender: "",
        birthday: "",
        address: "",
        bio: "",
        photoUrl: "",
        coverUrl: "",
        videos: [],
        createdAt: new Date().toISOString()
      };
    }

    async function saveUserToDb(userData) {
      if (!userData?.uid) throw new Error("Missing user UID");
      await setDoc(doc(db, "users", userData.uid), userData, { merge: true });
    }

    async function loadUserFromDb(uid) {
      const snap = await getDoc(doc(db, "users", uid));
      return snap.exists() ? snap.data() : null;
    }

    function switchTab(t) {
      $("login-form").classList.toggle("hidden", t !== 0);
      $("signup-form").classList.toggle("hidden", t !== 1);
      $("tab-login").className = t === 0 ? "tab-active" : "";
      $("tab-signup").className = t === 1 ? "tab-active" : "";
      $("tab-login").style.color = t === 0 ? "" : "#71717a";
      $("tab-signup").style.color = t === 1 ? "" : "#71717a";
      $("auth-status").innerHTML = "";
    }

    function togglePw(inputId, btnId) {
      const input = $(inputId);
      const btn = $(btnId);
      input.type = input.type === "password" ? "text" : "password";
      btn.textContent = input.type === "password" ? "👁" : "🙈";
    }

    function setLoading(buttonId, isLoading, text) {
      const btn = $(buttonId);
      if (!btn) return;
      btn.disabled = isLoading;
      btn.textContent = text;
    }

    function renderProfile(user) {
      $("auth-wrap").classList.add("hidden");
      $("profile-wrap").classList.remove("hidden");

      $("p-name").textContent = user?.name || user?.username || "User";
      $("p-username-tag").textContent = user?.username ? `@${user.username}` : "";
      $("p-bio").textContent = user?.bio || "No bio added";
      $("p-photo").src = user?.photoUrl || "https://via.placeholder.com/200?text=Photo";

      if (user?.coverUrl) {
        $("cover-bg").style.backgroundImage = `url('${user.coverUrl}')`;
      } else {
        $("cover-bg").style.backgroundImage = "linear-gradient(135deg,#1d4ed8,#38bdf8)";
      }
    }

    function renderVideos() {
      const container = $("video-grid");
      const noVideos = $("no-videos");
      container.innerHTML = "";

      const videos = Array.isArray(cu?.videos) ? cu.videos : [];

      if (videos.length === 0) {
        noVideos.style.display = "block";
        return;
      }

      noVideos.style.display = "none";

      videos.forEach((video, index) => {
        const card = document.createElement("div");
        card.className = "video-card";
        card.innerHTML = `
          <div class="video-player">
            <video src="${video?.url || ""}" controls preload="metadata"></video>
          </div>
          <div class="video-info">
            <div style="font-size:14px;font-weight:600;word-break:break-word;">${video?.title || "Untitled Video"}</div>
            <div style="font-size:12px;color:#71717a;">${video?.addedAt ? new Date(video.addedAt).toLocaleDateString() : ""}</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <button type="button" data-action="delete-video" data-index="${index}" class="btn btn-red" style="padding:6px 12px;font-size:12px;">Delete</button>
              <button type="button" data-action="rename-video" data-index="${index}" class="btn btn-gray" style="padding:6px 12px;font-size:12px;">Rename</button>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    async function persistUser(userData) {
      cu = userData;
      await saveUserToDb(userData);
      renderProfile(userData);
      renderVideos();
    }

    async function uploadMedia(file, folder) {
      if (!cu?.uid) throw new Error("No logged in user");
      const safeName = file.name.replace(/[^\w.\-]+/g, "_");
      const fileRef = ref(storage, `${folder}/${cu.uid}/${Date.now()}-${safeName}`);
      await uploadBytes(fileRef, file);
      return await getDownloadURL(fileRef);
    }

    async function doSignup() {
      if (state.logging) return;

      const email = $("s-email").value.trim();
      const password = $("s-pass").value.trim();

      const user = {
        username: $("s-user").value.trim(),
        name: $("s-name").value.trim(),
        email,
        phone: $("s-phone").value.trim(),
        age: $("s-age").value.trim(),
        gender: $("s-gender").value,
        birthday: $("s-bday").value,
        address: $("s-addr").value.trim(),
        bio: $("s-bio").value.trim(),
        photoUrl: "",
        coverUrl: "",
        videos: [],
        createdAt: new Date().toISOString()
      };

      if (!user.username || !user.name || !email || !password) {
        showAuthStatus("Please fill in all required fields.", false);
        return;
      }

      if (password.length < 6) {
        showAuthStatus("Password must be at least 6 characters.", false);
        return;
      }

      try {
        state.logging = true;
        setLoading("signup-btn", true, "Creating account...");
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(cred.user, { displayName: user.name });
        user.uid = cred.user.uid;
        await saveUserToDb(user);
        showAuthStatus("Account created successfully. You can now log in.", true);
        switchTab(0);
      } catch (error) {
        console.error(error);
        showAuthStatus(error.message || "Signup failed.", false);
      } finally {
        state.logging = false;
        setLoading("signup-btn", false, "Create Account");
      }
    }

    async function doLogin() {
      if (state.logging) return;

      const email = $("l-email").value.trim();
      const password = $("l-pass").value.trim();

      if (!email || !password) {
        showAuthStatus("Please enter your email and password.", false);
        return;
      }

      try {
        state.logging = true;
        setLoading("login-btn", true, "Signing in...");
        const cred = await signInWithEmailAndPassword(auth, email, password);

        const profile = await loadUserFromDb(cred.user.uid);
        cu = profile || defaultUser(cred.user.uid, cred.user.email, cred.user.displayName);

        if (!Array.isArray(cu.videos)) cu.videos = [];
        if (!profile) await saveUserToDb(cu);

        showAuthStatus("Login successful!", true);
        renderProfile(cu);
        renderVideos();
      } catch (error) {
        console.error(error);
        showAuthStatus("Invalid email or password.", false);
      } finally {
        state.logging = false;
        setLoading("login-btn", false, "Sign In");
      }
    }

    async function doLogout() {
      try {
        await signOut(auth);
        cu = null;
        $("profile-wrap").classList.add("hidden");
        $("auth-wrap").classList.remove("hidden");
        $("prof-status").innerHTML = "";
        showAuthStatus("Logged out successfully.", true);
      } catch (error) {
        console.error(error);
        showAuthStatus("Logout failed.", false);
      }
    }

    async function addVideo(e) {
      const file = e.target.files?.[0];
      if (!file || !cu) return;

      try {
        showProfStatus("Uploading video...", true);
        const url = await uploadMedia(file, "videos");
        const videoData = {
          url,
          title: file.name,
          addedAt: new Date().toISOString()
        };

        cu.videos = Array.isArray(cu.videos) ? cu.videos : [];
        cu.videos.push(videoData);

        await persistUser(cu);
        showProfStatus("Video uploaded and saved successfully!", true);
        e.target.value = "";
      } catch (error) {
        console.error(error);
        showProfStatus("Failed to upload video.", false);
      }
    }

    async function uploadPhoto(e) {
      const file = e.target.files?.[0];
      if (!file || !cu) return;

      try {
        showProfStatus("Uploading photo...", true);
        const url = await uploadMedia(file, "photos");
        cu.photoUrl = url;
        await persistUser(cu);
        showProfStatus("Profile photo updated successfully!", true);
        e.target.value = "";
      } catch (error) {
        console.error(error);
        showProfStatus("Failed to upload photo.", false);
      }
    }

    async function uploadCover(e) {
      const file = e.target.files?.[0];
      if (!file || !cu) return;

      try {
        showProfStatus("Uploading cover...", true);
        const url = await uploadMedia(file, "covers");
        cu.coverUrl = url;
        await persistUser(cu);
        showProfStatus("Cover photo updated successfully!", true);
        e.target.value = "";
      } catch (error) {
        console.error(error);
        showProfStatus("Failed to upload cover photo.", false);
      }
    }

    async function deleteVideo(index) {
      if (!cu?.videos?.length || index < 0 || index >= cu.videos.length) return;
      if (!confirm("Delete this video?")) return;

      cu.videos.splice(index, 1);
      try {
        await persistUser(cu);
        showProfStatus("Video deleted.", true);
      } catch (error) {
        console.error(error);
        showProfStatus("Failed to delete video.", false);
      }
    }

    async function renameVideo(index) {
      if (!cu?.videos?.length || index < 0 || index >= cu.videos.length) return;

      const newTitle = prompt("New title:", cu.videos[index].title || "");
      if (newTitle === null) return;

      cu.videos[index].title = newTitle.trim() || "Untitled Video";

      try {
        await persistUser(cu);
        showProfStatus("Video renamed.", true);
      } catch (error) {
        console.error(error);
        showProfStatus("Failed to rename video.", false);
      }
    }

    $("tab-login").addEventListener("click", () => switchTab(0));
    $("tab-signup").addEventListener("click", () => switchTab(1));
    $("go-login").addEventListener("click", () => switchTab(0));
    $("go-signup").addEventListener("click", () => switchTab(1));
    $("l-eye").addEventListener("click", () => togglePw("l-pass", "l-eye"));
    $("s-eye").addEventListener("click", () => togglePw("s-pass", "s-eye"));
    $("login-btn").addEventListener("click", doLogin);
    $("signup-btn").addEventListener("click", doSignup);
    $("logout-btn").addEventListener("click", doLogout);
    $("photo-btn").addEventListener("click", () => $("photo-upload-input").click());
    $("video-btn").addEventListener("click", () => $("video-upload-input").click());
    $("cover-btn").addEventListener("click", () => $("cover-upload-input").click());

    $("photo-upload-input").addEventListener("change", uploadPhoto);
    $("video-upload-input").addEventListener("change", addVideo);
    $("cover-upload-input").addEventListener("change", uploadCover);

    $("video-grid").addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-action]");
      if (!btn) return;
      const index = Number(btn.dataset.index);
      const action = btn.dataset.action;
      if (action === "delete-video") deleteVideo(index);
      if (action === "rename-video") renameVideo(index);
    });

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        try {
          state.loadingProfile = true;
          const profile = await loadUserFromDb(user.uid);
          cu = profile || defaultUser(user.uid, user.email, user.displayName);

          if (!Array.isArray(cu.videos)) cu.videos = [];
          if (!profile) await saveUserToDb(cu);

          renderProfile(cu);
          renderVideos();
        } catch (error) {
          console.error(error);
          showAuthStatus("Failed to load profile.", false);
        } finally {
          state.loadingProfile = false;
        }
      } else {
        cu = null;
        $("profile-wrap").classList.add("hidden");
        $("auth-wrap").classList.remove("hidden");
      }
    });

    window.addEventListener("DOMContentLoaded", () => {
      switchTab(0);
    });
  </script>
</body>
</html>
