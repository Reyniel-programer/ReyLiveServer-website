<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuthHub</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: #fff;
      min-height: 100vh;
    }

    .hidden {
      display: none !important;
    }

    .tab-active {
      border-bottom: 3px solid #f59e0b;
      color: #f59e0b !important;
      font-weight: bold;
    }

    input,
    select,
    textarea {
      background: #27272a;
      border: 1px solid #3f3f46;
      border-radius: 12px;
      color: #fff;
      padding: 10px 14px;
      width: 100%;
      outline: none;
      font-size: 14px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #f59e0b;
    }

    label {
      display: block;
      font-size: 13px;
      color: #a1a1aa;
      margin-bottom: 6px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      padding: 11px 18px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      transition: opacity 0.15s;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .btn-orange {
      background: #f59e0b;
      color: #000;
    }

    .btn-gray {
      background: #3f3f46;
      color: #fff;
    }

    .btn-red {
      background: #ef4444;
      color: #fff;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid #3f3f46;
      color: #fff;
      border-radius: 12px;
      padding: 11px 18px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    .btn-ghost:hover {
      background: #27272a;
    }

    .status-bar {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 10px;
      margin-top: 12px;
      font-size: 13px;
      max-width: 90%;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 16px;
    }

    .modal-box {
      background: #18181b;
      border-radius: 24px;
      width: 100%;
      max-width: 620px;
      border: 1px solid #3f3f46;
    }

    .modal-head,
    .modal-foot {
      padding: 20px 24px;
      border-bottom: 1px solid #27272a;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-foot {
      border-top: 1px solid #27272a;
      border-bottom: none;
      gap: 10px;
    }

    .modal-body {
      padding: 20px 24px;
      max-height: 72vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .rel-pw {
      position: relative;
    }

    .pw-eye {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #71717a;
      font-size: 14px;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .video-card {
      background: #27272a;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #3f3f46;
      display: flex;
      flex-direction: column;
    }

    .video-player video {
      width: 100%;
      height: 150px;
      background: #000;
      object-fit: cover;
    }

    .video-info {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-grow: 1;
    }

    .section-box {
      background: #18181b;
      border-radius: 18px;
      padding: 20px;
      border: 1px solid #27272a;
    }

    @media (max-width: 700px) {
      .grid2 {
        grid-template-columns: 1fr;
      }

      .profile-body {
        grid-template-columns: 1fr !important;
      }

      .video-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <!-- AUTH -->
    <div id="auth-wrap" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#0f172a,#18181b)">
      <div style="width:100%;max-width:480px;background:#18181b;border-radius:24px;border:1px solid #f59e0b33;overflow:hidden;">
        <div style="padding:32px 32px 24px;text-align:center;border-bottom:1px solid #27272a;">
          <h1 style="font-size:24px;color:#f59e0b;font-weight:700;">AuthHub</h1>
          <p style="color:#71717a;font-size:13px;margin-top:6px;">Login or create your personal profile</p>
        </div>

        <div style="display:flex;border-bottom:1px solid #27272a;">
          <button onclick="switchTab(0)" id="tab-login" class="tab-active" style="flex:1;padding:14px;background:none;border:none;color:inherit;font-size:13px;cursor:pointer;">Login</button>
          <button onclick="switchTab(1)" id="tab-signup" style="flex:1;padding:14px;background:none;border:none;color:#71717a;font-size:13px;cursor:pointer;">Sign Up</button>
        </div>

        <div style="padding:28px;">
          <div id="login-form">
            <div style="display:flex;flex-direction:column;gap:14px;">
              <div>
                <label>Email</label>
                <input id="l-email" type="email" placeholder="Enter email" />
              </div>

              <div>
                <label>Password</label>
                <div class="rel-pw">
                  <input id="l-pass" type="password" placeholder="Enter password" />
                  <button type="button" class="pw-eye" onclick="togglePw('l-pass','l-eye')" id="l-eye">👁</button>
                </div>
              </div>

              <button class="btn btn-orange" style="width:100%;justify-content:center;" onclick="doLogin()">Sign In</button>
            </div>

            <p style="text-align:center;margin-top:16px;font-size:13px;color:#71717a;">
              Don't have an account?
              <span onclick="switchTab(1)" style="color:#f59e0b;cursor:pointer;font-weight:600;">Sign up</span>
            </p>
          </div>

          <div id="signup-form" class="hidden">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
              <div><label>Username</label><input id="s-user" placeholder="Choose username" /></div>
              <div><label>Full Name</label><input id="s-name" placeholder="Your name" /></div>
              <div><label>Email</label><input id="s-email" type="email" placeholder="you@email.com" /></div>
              <div><label>Phone</label><input id="s-phone" type="tel" placeholder="+63 9XX XXX XXX" /></div>

              <div>
                <label>Password</label>
                <div class="rel-pw">
                  <input id="s-pass" type="password" placeholder="Min 6 chars" />
                  <button type="button" class="pw-eye" onclick="togglePw('s-pass','s-eye')" id="s-eye">👁</button>
                </div>
              </div>

              <div><label>Age</label><input id="s-age" type="number" placeholder="Age" /></div>

              <div>
                <label>Gender</label>
                <select id="s-gender">
                  <option value="">Select</option>
                  <option>Male</option>
                  <option>Female</option>
                  <option>Prefer not to say</option>
                </select>
              </div>

              <div><label>Birthday</label><input id="s-bday" type="date" /></div>
              <div style="grid-column:span 2"><label>Address</label><input id="s-addr" placeholder="Your address" /></div>
              <div style="grid-column:span 2"><label>Bio</label><textarea id="s-bio" rows="2" placeholder="Tell something about yourself"></textarea></div>
              <div style="grid-column:span 2"><button class="btn btn-orange" style="width:100%;justify-content:center;" onclick="doSignup()">Create Account</button></div>
            </div>

            <p style="text-align:center;margin-top:14px;font-size:13px;color:#71717a;">
              Already have an account?
              <span onclick="switchTab(0)" style="color:#f59e0b;cursor:pointer;font-weight:600;">Sign in</span>
            </p>
          </div>

          <div id="auth-status"></div>
        </div>
      </div>
    </div>

    <!-- PROFILE -->
    <div id="profile-wrap" class="hidden" style="background:#09090b;min-height:100vh;">
      <div style="height:220px;overflow:hidden;position:relative;">
        <div id="cover-bg" style="width:100%;height:100%;background:linear-gradient(135deg,#1d4ed8,#38bdf8);background-size:cover;background-position:center;"></div>
      </div>

      <div style="background:#18181b;padding:24px;border-bottom:1px solid #27272a;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
        <div>
          <h2 id="p-name" style="font-size:22px;font-weight:700;"></h2>
          <p id="p-username-tag" style="color:#71717a;font-size:14px;"></p>
        </div>
        <button class="btn btn-ghost" onclick="doLogout()">Log Out</button>
      </div>

      <div class="profile-body" style="max-width:900px;margin:0 auto;padding:24px 16px;display:grid;grid-template-columns:280px 1fr;gap:20px;">
        <div class="section-box">
          <h3 style="font-size:16px;font-weight:700;margin-bottom:12px;">Intro</h3>
          <p id="p-bio" style="color:#a1a1aa;font-size:13px;font-style:italic;margin-bottom:14px;">No bio added</p>
        </div>

        <div class="section-box">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px;flex-wrap:wrap;">
            <h3 style="font-size:16px;font-weight:700;">My Videos</h3>
            <button class="btn btn-orange" onclick="document.getElementById('video-upload-input').click()" style="padding:8px 16px;font-size:13px;">
              + Add Video
            </button>
            <input type="file" id="video-upload-input" accept="video/*" class="hidden" onchange="addVideo(event)" />
          </div>

          <div id="video-grid" class="video-grid"></div>
          <div id="no-videos" style="text-align:center;padding:40px 20px;color:#71717a;display:none;">
            No videos yet. Upload your first video!
          </div>
        </div>
      </div>

      <div id="prof-status" style="text-align:center;padding:0 0 20px;"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc
    } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";
    import {
      getStorage,
      ref,
      uploadBytes,
      getDownloadURL
    } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let cu = null;

    const $ = (id) => document.getElementById(id);

    function showAuthStatus(msg, ok) {
      $("auth-status").innerHTML = `<div class="status-bar" style="background:${ok ? "#14532d" : "#7f1d1d"};">${msg}</div>`;
    }

    function showProfStatus(msg, ok) {
      $("prof-status").innerHTML = `<div class="status-bar" style="background:${ok ? "#14532d" : "#7f1d1d"};">${msg}</div>`;
    }

    async function saveUserToDb(user) {
      await setDoc(doc(db, "users", user.uid), user, { merge: true });
    }

    async function loadUserFromDb(uid) {
      const snap = await getDoc(doc(db, "users", uid));
      return snap.exists() ? snap.data() : null;
    }

    function switchTab(t) {
      $("login-form").classList.toggle("hidden", t !== 0);
      $("signup-form").classList.toggle("hidden", t !== 1);
      $("tab-login").className = t === 0 ? "tab-active" : "";
      $("tab-signup").className = t === 1 ? "tab-active" : "";
      $("tab-login").style.color = t === 0 ? "" : "#71717a";
      $("tab-signup").style.color = t === 1 ? "" : "#71717a";
      $("auth-status").innerHTML = "";
    }

    function togglePw(inputId, btnId) {
      const input = $(inputId);
      const btn = $(btnId);
      input.type = input.type === "password" ? "text" : "password";
      btn.textContent = input.type === "password" ? "👁" : "🙈";
    }

    function renderProfile(user) {
      $("auth-wrap").classList.add("hidden");
      $("profile-wrap").classList.remove("hidden");

      $("p-name").textContent = user.name || user.username || "User";
      $("p-username-tag").textContent = user.username ? `@${user.username}` : "";
      $("p-bio").textContent = user.bio || "No bio added";
    }

    async function persistUser(user) {
      cu = user;
      await saveUserToDb(user);
      renderProfile(user);
      renderVideos();
    }

    async function doSignup() {
      const email = $("s-email").value.trim();
      const password = $("s-pass").value;

      const user = {
        username: $("s-user").value.trim(),
        name: $("s-name").value.trim(),
        email,
        phone: $("s-phone").value.trim(),
        age: $("s-age").value.trim(),
        gender: $("s-gender").value,
        birthday: $("s-bday").value,
        address: $("s-addr").value.trim(),
        bio: $("s-bio").value.trim(),
        videos: []
      };

      if (!user.username || !user.name || !email || !password) {
        showAuthStatus("Please fill in all required fields.", false);
        return;
      }

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(cred.user, { displayName: user.name });

        user.uid = cred.user.uid;
        await persistUser(user);

        showAuthStatus("Account created successfully!", true);
      } catch (error) {
        console.error(error);
        showAuthStatus(error.message || "Signup failed.", false);
      }
    }

    async function doLogin() {
      const email = $("l-email").value.trim();
      const password = $("l-pass").value;

      if (!email || !password) {
        showAuthStatus("Please enter your email and password.", false);
        return;
      }

      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        const profile = await loadUserFromDb(cred.user.uid);

        cu = profile || {
          uid: cred.user.uid,
          email: cred.user.email,
          name: cred.user.displayName || "User",
          username: cred.user.email.split("@")[0],
          bio: "",
          videos: []
        };

        if (!profile) {
          await saveUserToDb(cu);
        }

        showAuthStatus("Login successful!", true);
        renderProfile(cu);
        renderVideos();
      } catch (error) {
        console.error(error);
        showAuthStatus("Invalid email or password.", false);
      }
    }

    async function doLogout() {
      try {
        await signOut(auth);
        cu = null;
        $("profile-wrap").classList.add("hidden");
        $("auth-wrap").classList.remove("hidden");
        $("prof-status").innerHTML = "";
        showAuthStatus("Logged out successfully.", true);
      } catch (error) {
        console.error(error);
        showAuthStatus("Logout failed.", false);
      }
    }

    async function addVideo(e) {
      const file = e.target.files[0];
      if (!file || !cu) return;

      try {
        const videoRef = ref(storage, `videos/${cu.uid}/${Date.now()}-${file.name}`);
        await uploadBytes(videoRef, file);
        const downloadURL = await getDownloadURL(videoRef);

        const videoData = {
          url: downloadURL,
          title: file.name,
          addedAt: new Date().toISOString()
        };

        cu.videos = cu.videos || [];
        cu.videos.push(videoData);

        await persistUser(cu);
        showProfStatus("Video uploaded and saved successfully!", true);
        e.target.value = "";
      } catch (error) {
        console.error(error);
        showProfStatus("Failed to upload video.", false);
      }
    }

    function renderVideos() {
      const container = $("video-grid");
      const noVideos = $("no-videos");
      container.innerHTML = "";

      const videos = cu?.videos || [];

      if (videos.length === 0) {
        noVideos.style.display = "block";
        return;
      }

      noVideos.style.display = "none";

      videos.forEach((video, index) => {
        const card = document.createElement("div");
        card.className = "video-card";
        card.innerHTML = `
          <div class="video-player">
            <video src="${video.url}" controls preload="metadata"></video>
          </div>
          <div class="video-info">
            <div style="font-size:14px;font-weight:600;word-break:break-word;">${video.title || "Untitled Video"}</div>
            <div style="font-size:12px;color:#71717a;">${video.addedAt ? new Date(video.addedAt).toLocaleDateString() : ""}</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <button onclick="deleteVideo(${index})" class="btn btn-red" style="padding:6px 12px;font-size:12px;">Delete</button>
              <button onclick="renameVideo(${index})" class="btn btn-gray" style="padding:6px 12px;font-size:12px;">Rename</button>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    async function deleteVideo(index) {
      if (!cu?.videos?.length) return;
      if (!confirm("Delete this video?")) return;

      cu.videos.splice(index, 1);
      await persistUser(cu);
      showProfStatus("Video deleted.", true);
    }

    async function renameVideo(index) {
      if (!cu?.videos?.length) return;

      const newTitle = prompt("New title:", cu.videos[index].title || "");
      if (newTitle === null) return;

      cu.videos[index].title = newTitle.trim() || "Untitled Video";
      await persistUser(cu);
      showProfStatus("Video renamed.", true);
    }

    window.switchTab = switchTab;
    window.togglePw = togglePw;
    window.doSignup = doSignup;
    window.doLogin = doLogin;
    window.doLogout = doLogout;
    window.addVideo = addVideo;
    window.deleteVideo = deleteVideo;
    window.renameVideo = renameVideo;

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const profile = await loadUserFromDb(user.uid);

        cu = profile || {
          uid: user.uid,
          email: user.email,
          name: user.displayName || "User",
          username: user.email?.split("@")[0] || "user",
          bio: "",
          videos: []
        };

        if (!profile) {
          await saveUserToDb(cu);
        }

        renderProfile(cu);
        renderVideos();
      } else {
        cu = null;
        $("profile-wrap").classList.add("hidden");
        $("auth-wrap").classList.remove("hidden");
      }
    });

    window.onload = function () {
      switchTab(0);
    };
  </script>
</body>
</html>
